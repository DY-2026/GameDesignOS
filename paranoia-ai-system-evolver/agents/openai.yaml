interface:
  display_name: "Paranoia AI System Evolver"
  short_description: "用意图工作单、workflow-run.governance、WOOP、RJR-AI、VOI、OODA 与 Evals 受控进化 AI 系统"
  default_prompt: "使用 $paranoia-ai-system-evolver：先把任务从指令单升级为 Intent Work Order，说明要改变什么现实、服务哪个更大目标、完成后外部世界应变成什么状态、谁验收、第一眼必须看懂什么、哪些不能牺牲、AI 可以自由改什么、不能碰什么、原计划失败时按什么原则改方向，以及交付前自查哪些失败信号。若任务属于项目流程或产出质量治理，同时写入 workflow-run.governance：intent_work_order_ref、decision_ref、voi_gate_ref、ul_state_ref、rjr_authority_ref、paranoia_review_ref、human_gate_refs、rollback_ref、candidate_learning_refs 和 retrospective_ref。再定义决策、选项、current default action 和决策边界，建立 RJR-AI 授权门：coupling、reversibility、authority_level、delegation_matrix、residual_judgment。然后用 VOI/EVPI/EVSI 选择最小高价值信息探针，并按具体场景定义有效证据、弱证据、最小探针和停止规则。用 UL（Uncertainty Ladder，不确定性阶梯）声明当前 UL-L0～UL-L5、本轮释放与保持不变的变量、支架、后果预算、失败归因、迁移检查和 fallback；最后形成带 WOOP、OODA、eval、Human Gate、rollback 和复盘沉淀的候选系统改动。"
