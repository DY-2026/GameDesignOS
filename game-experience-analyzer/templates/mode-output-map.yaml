      - transferable_patterns
      - non_transferable_constraints
      - category_risks
    optional_lenses:
      - market_context_voi
      - mda
      - trailer_heat_prediction
    required_sections:
      - 样本与边界
      - 品类路由与策略
      - 对标与迁移判断
      - 问题列表
      - 优化建议

  problem_diagnosis:
    required_lenses:
      - issue_priority
      - root_cause
      - minimum_fix
      - validation_plan
    optional_lenses:
      - four_step_experience
      - gameplay_mechanics
      - ux_ui
      - commercialization
    required_sections:
      - 样本与边界
      - 分析模式与问题框架
      - 问题列表
      - 优化建议

  liveops_longevity:
    required_lenses:
      - day1_goal
      - day7_goal
      - daily_loop
      - event_layer
      - long_term_asset
    optional_lenses:
      - economy
      - commercialization
      - social_competition
